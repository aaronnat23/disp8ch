name: Installer Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "install.js"
      - "install.ps1"
      - "scripts/install*.ts"
      - "scripts/install*.ps1"
      - "scripts/install.sh"
      - "scripts/runtime-*.ts"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  installer-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 10.30.2
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm install:test
      - name: Windows installer wrapper
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\install.ps1 -NoStart
      - name: Unix installer local checkout
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/install.sh --no-start
