name: Release Desktop Artifacts

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - stable

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            command: pnpm desktop:dist -- --win
          - os: macos-latest
            command: pnpm desktop:dist -- --mac
          - os: ubuntu-latest
            command: pnpm desktop:dist -- --linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2
      - uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm install:test
      - run: pnpm desktop:smoke
      - name: Packaged launch smoke
        run: |
          pnpm build
          pnpm desktop:build
          pnpm desktop:stage
          pnpm exec electron-builder --dir
          pnpm desktop:packaged-smoke
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - run: ${{ matrix.command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          RELEASE_CHANNEL: ${{ github.event.inputs.channel }}
      - name: Validate release manifest
        run: pnpm desktop:manifest -- --channel ${{ github.event.inputs.channel }}
        env:
          RELEASE_BASE_URL: ${{ vars.RELEASE_BASE_URL }}
      - name: Generate package-manager manifests
        if: vars.RELEASE_BASE_URL != ''
        run: pnpm desktop:package-manifests
        env:
          RELEASE_BASE_URL: ${{ vars.RELEASE_BASE_URL }}
      - name: Windows installer execution smoke
        if: runner.os == 'Windows'
        run: pnpm desktop:installer-smoke
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: dist/desktop/**
