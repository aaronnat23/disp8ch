<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="560" viewBox="0 0 1440 560" role="img" aria-label="disp8ch local model stack infographic">
  <defs>
    <style>
      .bg{fill:#050505}.frame{fill:#080808;stroke:#262626}.panel{fill:#0b0b0b;stroke:#333}.hot{fill:#140606;stroke:#ff1f1f;stroke-width:1.4}.text{fill:#f4f4f5}.muted{fill:#a1a1aa}.dim{fill:#73737d}.red{fill:#ff1f1f}.line{stroke:#ff1f1f;stroke-width:2;fill:none}.thin{stroke:#4a4a4f;stroke-width:1.3;fill:none}.mono{font-family:"JetBrains Mono","Fira Code","Courier New",monospace}.title{font-size:32px;font-weight:800}.label{font-size:18px;font-weight:800}.small{font-size:13px}.tiny{font-size:11px;letter-spacing:1px}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#ff1f1f"/></marker>
  </defs>
  <rect class="bg" width="1440" height="560"/>
  <rect class="frame" x="28" y="28" width="1384" height="504" rx="8"/>
  <text class="mono red tiny" x="64" y="76">// RUN CORE FEATURES WITHOUT A CLOUD MODEL KEY</text>
  <text class="mono text title" x="64" y="118">Local Model Freedom, With Optional Cloud Providers</text>
  <text class="mono muted small" x="64" y="148">Your database, documents, memories, workflows, and chat history stay local.</text>
  <text class="mono muted small" x="64" y="171">Only configured model and tool calls leave the machine.</text>

  <g transform="translate(76 270)">
    <rect class="panel" width="250" height="128" rx="6"/>
    <text class="mono text label" x="20" y="42">Browser UI</text>
    <text class="mono muted small" x="20" y="76">WebChat, Workflows, Boards</text>
    <text class="mono muted small" x="20" y="102">Hierarchy, Council, Data Sources</text>
  </g>
  <path class="line" d="M326 334 H410" marker-end="url(#arrow)"/>

  <g transform="translate(428 245)">
    <rect class="hot" width="270" height="178" rx="6"/>
    <text class="mono red tiny" x="22" y="34">DISP8CH RUNTIME</text>
    <text class="mono text label" x="22" y="68">Router + Tools</text>
    <text class="mono muted small" x="22" y="102">model routing</text>
    <text class="mono muted small" x="22" y="128">tool approvals</text>
    <text class="mono muted small" x="22" y="154">local state + traces</text>
  </g>
  <path class="line" d="M698 334 H782" marker-end="url(#arrow)"/>

  <g transform="translate(800 205)">
    <rect class="panel" width="255" height="112" rx="6"/>
    <text class="mono text label" x="20" y="40">Local Endpoints</text>
    <text class="mono muted small" x="20" y="72">Ollama, LM Studio</text>
    <text class="mono muted small" x="20" y="96">llama.cpp, vLLM, SGLang</text>
  </g>
  <g transform="translate(800 365)">
    <rect class="panel" width="255" height="112" rx="6"/>
    <text class="mono text label" x="20" y="40">Optional Providers</text>
    <text class="mono muted small" x="20" y="72">DeepSeek, OpenAI, Anthropic</text>
    <text class="mono muted small" x="20" y="96">OpenRouter, Google, more</text>
  </g>
  <path class="thin" d="M1055 261 H1138" marker-end="url(#arrow)"/>
  <path class="thin" d="M1055 421 H1138" marker-end="url(#arrow)"/>

  <g transform="translate(1156 270)">
    <rect class="panel" width="210" height="128" rx="6"/>
    <text class="mono text label" x="20" y="42">Same Workspace</text>
    <text class="mono muted small" x="20" y="76">chat + memory</text>
    <text class="mono muted small" x="20" y="102">docs + workflows + agents</text>
  </g>
</svg>
